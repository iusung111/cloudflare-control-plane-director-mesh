name = "cloudflare-control-plane-director-mesh"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-01-01"

[[durable_objects.bindings]]
name = "MISSION_ROOM"
class_name = "MissionRoomDurableObject"

[[durable_objects.bindings]]
name = "MCP_BROKER"
class_name = "McpBrokerDurableObject"

[[durable_objects.bindings]]
name = "CONTROL_STATE"
class_name = "ControlStateDurableObject"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MissionRoomDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["McpBrokerDurableObject"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ControlStateDurableObject"]

[[queues.producers]]
binding = "CONTROL_QUEUE"
queue = "cloudflare-control-plane-director-mesh-control"

[[queues.consumers]]
queue = "cloudflare-control-plane-director-mesh-control"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "cloudflare-control-plane-director-mesh-dlq"
retry_delay = 30

[vars]
# GITHUB_OWNER = "your-org"
# GITHUB_REPO = "your-repo"
# GITHUB_BRANCH = "master" (Must be explicitly configured)
# GITHUB_TOKEN = "your-fine-grained-pat" (fallback path)
# GITHUB_APP_ID = "your-app-id"
# GITHUB_APP_CLIENT_ID = "Iv1.your-client-id" (preferred issuer for JWT)
# GITHUB_INSTALLATION_ID = "your-installation-id"
# GITHUB_PRIVATE_KEY = "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----" (set via `wrangler secret put`)
# CONTROL_PLANE_OPERATOR_TOKEN = "operator-bearer-token"
# CONTROL_PLANE_VIEWER_TOKEN = "viewer-bearer-token"
# CONTROL_PLANE_APP_PASSWORD = "browser-login-password"
# CONTROL_PLANE_COOKIE_SECRET = "signed-cookie-secret"
